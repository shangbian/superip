<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一站式社会化获客AI助手</title>
    <!-- Markdown 渲染库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Inter 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Coze风格配色方案 - 白色主题 */
            --primary: #2563eb;
            --secondary: #3b82f6;
            --accent: #60a5fa;
            --background: #ffffff;
            --background-light: #f8f9fa;
            --text: #1e293b;
            --text-dark: #0f172a;
            --text-light: #64748b;
            --text-secondary: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --shadow: rgba(0, 0, 0, 0.08);
            --shadow-hover: rgba(0, 0, 0, 0.12);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--background);
            min-height: 100vh;
            color: var(--text-dark);
            overflow-x: hidden;
            position: relative;
        }

        /* 顶部导航栏 - Coze风格 */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: var(--background);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 30px;
            z-index: 1000;
            box-shadow: 0 1px 3px var(--shadow);
        }

        .nav-logo {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-right: 40px;
            white-space: nowrap;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 8px 15px;
            border-radius: 8px;
        }

        .nav-logo:hover {
            background: var(--background-light);
            color: var(--primary);
        }

        .nav-search {
            flex: 1;
            max-width: 500px;
            position: relative;
            margin-right: 20px;
        }

        .search-input {
            width: 100%;
            padding: 12px 45px 12px 20px;
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-dark);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .search-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .search-results {
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            right: 0;
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: 8px;
            max-height: 400px;
            overflow-y: auto;
            box-shadow: 0 4px 12px var(--shadow);
            display: none;
            z-index: 1001;
            pointer-events: auto;
        }

        .search-results.active {
            display: block;
        }

        .search-result-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            transition: background 0.2s ease;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
            z-index: 1002;
        }

        .search-result-item:hover,
        .search-result-item.selected {
            background: var(--background-light);
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .result-item-name {
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }

        .result-item-desc {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .result-item-category {
            display: inline-block;
            font-size: 0.75rem;
            padding: 2px 8px;
            background: var(--primary);
            color: white;
            border-radius: 4px;
            margin-top: 4px;
        }

        .nav-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .nav-button {
            padding: 10px 20px;
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-dark);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .nav-button:hover {
            background: var(--background-light);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* 主布局 */
        .main-layout {
            display: flex;
            margin-top: 70px;
            min-height: calc(100vh - 70px);
            position: relative;
            z-index: 1;
        }

        /* 侧边栏 - Coze风格 */
        .sidebar {
            width: 280px;
            background: var(--background-light);
            border-right: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
            position: fixed;
            height: calc(100vh - 70px);
            z-index: 100;
        }

        .sidebar-header {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .category-group {
            margin-bottom: 25px;
        }

        .category-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s ease;
            user-select: none;
        }

        .category-header:hover {
            background: var(--background);
        }

        .category-toggle {
            font-size: 0.8rem;
            transition: transform 0.3s ease;
            opacity: 0.7;
        }

        .category-group.collapsed .agent-list {
            display: none;
        }

        .agent-list {
            margin-top: 8px;
        }

        .agent-item {
            padding: 10px 12px;
            margin-bottom: 6px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-dark);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .agent-item:hover {
            background: var(--background);
        }

        .agent-item.active {
            background: var(--background);
            border-left: 3px solid var(--primary);
            font-weight: 600;
            color: var(--primary);
        }

        .agent-item.has-history::before {
            content: '📝';
            font-size: 0.85rem;
        }

        .agent-item-name {
            flex: 1;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
            max-width: calc(100% - 280px);
        }

        /* 卡片样式 - Coze风格 */
        .glass-card {
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 1px 3px var(--shadow);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            box-shadow: 0 4px 12px var(--shadow-hover);
        }

        .agent-info-card {
            background: var(--background);
            border: 1px solid var(--border);
            color: var(--text-dark);
        }

        .agent-info-card h2 {
            font-size: 1.8rem;
            color: var(--text-dark);
            margin-bottom: 20px;
        }

        .agent-info-box {
            background: var(--background-light);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            border-left: 4px solid var(--primary);
        }

        .agent-info-box h3 {
            color: var(--text-dark);
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .agent-info-box p {
            color: var(--text-light);
            line-height: 1.8;
            margin-bottom: 8px;
        }

        /* 输入区域 */
        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .input-group textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            transition: all 0.3s ease;
            color: var(--text-dark);
        }

        .input-group textarea::placeholder {
            color: var(--text-secondary);
        }

        .input-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        /* 按钮 */
        .button-group {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: 1px solid var(--primary);
            box-shadow: 0 2px 4px var(--shadow);
        }

        .btn-primary:hover:not(:disabled) {
            background: #1d4ed8;
            box-shadow: 0 4px 8px var(--shadow-hover);
        }

        .btn-primary:disabled {
            background: var(--border);
            color: var(--text-secondary);
            cursor: not-allowed;
            transform: none;
            opacity: 0.6;
        }

        .btn-secondary {
            background: var(--background);
            color: var(--text-dark);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--background-light);
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-danger {
            background: var(--error);
            color: white;
            border: 1px solid var(--error);
        }

        .btn-danger:hover {
            background: #dc2626;
            box-shadow: 0 2px 4px var(--shadow);
        }

        .btn-success {
            background: var(--success);
            color: white;
            border: 1px solid var(--success);
        }

        .btn-success:hover {
            background: #059669;
            box-shadow: 0 2px 4px var(--shadow);
        }

        /* 加载动画 */
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.active {
            display: block;
        }

        .loading-spinner {
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        .loading p {
            color: var(--text-light);
        }

        /* 结果展示 - Coze风格 */
        .result-card {
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            margin-top: 20px;
            box-shadow: 0 1px 3px var(--shadow);
            display: none;
            animation: fadeInUp 0.5s ease;
        }

        .result-card.active {
            display: block;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 15px;
        }

        .result-header h3 {
            font-size: 1.5rem;
            color: var(--text-dark);
        }

        .result-content {
            color: var(--text-dark);
            line-height: 1.8;
            font-size: 1.05rem;
        }

        .result-content h1,
        .result-content h2,
        .result-content h3 {
            color: var(--text-dark);
            margin-top: 1.5em;
            margin-bottom: 0.8em;
        }

        .result-content p {
            margin-bottom: 1em;
            color: var(--text-light);
        }

        .result-content ul,
        .result-content ol {
            margin-left: 2em;
            margin-bottom: 1em;
            color: var(--text-light);
        }

        .result-content code {
            background: var(--background-light);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: var(--text-dark);
        }

        .result-content pre {
            background: var(--background-light);
            color: var(--text-dark);
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 1em;
            border: 1px solid var(--border);
        }

        .result-content blockquote {
            border-left: 4px solid var(--primary);
            padding-left: 1em;
            margin-left: 0;
            color: var(--text-light);
            font-style: italic;
        }

        /* 提示消息 - Coze风格 */
        .toast {
            position: fixed;
            top: 90px;
            right: 30px;
            background: var(--background);
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 12px var(--shadow);
            display: none;
            z-index: 2000;
            animation: slideInRight 0.3s ease;
            border-left: 4px solid var(--success);
            color: var(--text-dark);
        }

        .toast.active {
            display: block;
        }

        .toast.error {
            border-left-color: var(--error);
        }


        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
            }
            to {
                transform: translateX(0);
            }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 响应式设计 */
        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
                max-width: 100%;
            }

            .nav-search {
                max-width: 300px;
            }
        }

        @media (max-width: 768px) {
            .top-nav {
                padding: 0 15px;
                height: 60px;
            }

            .nav-logo {
                font-size: 1.2rem;
                margin-right: 15px;
            }

            .nav-search {
                max-width: 200px;
                margin-right: 10px;
            }

            .search-input {
                padding: 10px 40px 10px 15px;
                font-size: 0.85rem;
            }

            .nav-button {
                padding: 8px 12px;
                font-size: 0.8rem;
            }

            .main-layout {
                margin-top: 60px;
            }

            .sidebar {
                width: 100%;
                max-width: 320px;
                height: calc(100vh - 60px);
            }

            .main-content {
                padding: 20px 15px;
            }

            .glass-card {
                padding: 20px;
            }
        }

        /* 移动端菜单按钮 */
        .mobile-menu-btn {
            display: none;
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text-dark);
            cursor: pointer;
            margin-right: 15px;
        }

        @media (max-width: 1024px) {
            .mobile-menu-btn {
                display: block;
            }
        }

        /* 侧边栏遮罩 */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(2px);
            z-index: 99;
        }

        .sidebar-overlay.active {
            display: block;
        }

        @media (max-width: 1024px) {
            .sidebar-overlay {
                top: 60px;
            }
        }

        /* 首页指引样式 */
        .homepage-guide {
            animation: fadeIn 0.5s ease;
        }

        .welcome-section {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 20px;
        }

        .welcome-section h1 {
            font-size: 2.5rem;
            color: var(--text-dark);
            margin-bottom: 15px;
            font-weight: 700;
        }

        .welcome-subtitle {
            font-size: 1.2rem;
            color: var(--text-light);
            font-weight: 400;
        }

        /* 页签容器 */
        .tabs-container {
            margin-top: 30px;
        }

        /* 页签导航 - Coze风格，简单文本标签 */
        .tabs-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .tabs-nav::-webkit-scrollbar {
            height: 6px;
        }

        .tabs-nav::-webkit-scrollbar-track {
            background: transparent;
        }

        .tabs-nav::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .tab-button {
            padding: 8px 16px;
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-dark);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .tab-button:hover {
            background: var(--background-light);
            border-color: var(--primary);
        }

        .tab-button.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .tab-button .tab-count {
            font-size: 0.85rem;
            opacity: 0.7;
        }

        .tab-button.active .tab-count {
            opacity: 1;
        }

        /* 页签内容区 */
        .tabs-content {
            min-height: 400px;
        }

        .tab-panel {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-panel.active {
            display: block;
        }

        /* 智能体卡片网格 */
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        /* 智能体卡片 - Coze风格 */
        .agent-card {
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
            box-shadow: 0 1px 3px var(--shadow);
        }

        .agent-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 12px var(--shadow-hover);
            border-color: var(--primary);
        }

        .agent-card-image {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .agent-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .agent-card-image .icon-placeholder {
            font-size: 48px;
            color: white;
            opacity: 0.8;
        }

        .agent-card-content {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .agent-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 10px;
        }

        .agent-card-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-dark);
            flex: 1;
            line-height: 1.4;
        }

        .agent-card-type {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 500;
            white-space: nowrap;
        }

        .agent-card-type.app {
            background: #d1fae5;
            color: #065f46;
        }

        .agent-card-type.agent {
            background: #dbeafe;
            color: #1e40af;
        }

        .agent-card-type.workflow {
            background: #f3e8ff;
            color: #6b21a8;
        }

        .agent-card-provider {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .agent-card-description {
            color: var(--text-light);
            line-height: 1.6;
            font-size: 0.9rem;
            margin-bottom: 15px;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .agent-card-footer {
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .agent-card-action {
            font-size: 0.9rem;
            color: var(--text-dark);
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .agent-card:hover .agent-card-action {
            color: var(--primary);
        }

        .agent-card-category {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* 对话式界面 */
        .chat-view {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 70px - 40px);
            min-height: 420px;
            background: var(--background);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--background-light);
        }
        .chat-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-dark);
            margin: 0;
        }
        .chat-header-actions { display: flex; gap: 8px; }
        .btn-sm { padding: 6px 12px; font-size: 0.85rem; }
        .chat-placeholder {
            color: var(--text-light);
            text-align: center;
            padding: 24px 16px;
            font-size: 0.95rem;
        }
        .chat-guide-block {
            background: var(--background-light);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
        }
        .chat-guide-title {
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 12px;
            font-size: 1rem;
        }
        .chat-guide-text {
            color: var(--text);
            line-height: 1.7;
            font-size: 0.95rem;
            white-space: pre-wrap;
            margin-bottom: 16px;
        }
        .chat-guide-block .chat-placeholder {
            padding: 12px 0 0;
            margin-bottom: 0;
        }
        /* Coze 风格对话区 */
        .chat-view.coze-style { display: flex; flex-direction: column; }
        .coze-chat-header {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; border-bottom: 1px solid var(--border);
            background: var(--background); flex-shrink: 0;
        }
        .coze-back {
            width: 36px; height: 36px; border: none; border-radius: 8px;
            background: var(--background-light); color: var(--text-dark);
            font-size: 1.4rem; line-height: 1; cursor: pointer;
        }
        .coze-chat-title-wrap { flex: 1; min-width: 0; }
        .coze-chat-header h2 { font-size: 1rem; font-weight: 600; margin: 0 0 2px 0; }
        .coze-chat-subtitle { font-size: 0.75rem; color: var(--text-light); margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .coze-header-actions { display: flex; gap: 4px; }
        .coze-icon-btn {
            width: 36px; height: 36px; border: none; border-radius: 8px;
            background: transparent; font-size: 1.1rem; cursor: pointer;
        }
        .coze-icon-btn:hover { background: var(--background-light); }
        .coze-empty-state {
            padding: 24px 20px; text-align: center; flex-shrink: 0;
        }
        .coze-agent-avatar {
            width: 72px; height: 72px; margin: 0 auto 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
        }
        .coze-avatar-icon { font-size: 36px; }
        .coze-agent-title { font-size: 1.15rem; font-weight: 600; margin-bottom: 16px; color: var(--text-dark); }
        .coze-welcome-bubble {
            max-width: 90%; margin: 0 auto 20px; padding: 16px 20px;
            background: var(--background-light); border: 1px solid var(--border);
            border-radius: 12px; text-align: left; font-size: 0.95rem;
            line-height: 1.6; color: var(--text);
        }
        .coze-suggested-prompts {
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
        }
        .coze-prompt-chip {
            padding: 10px 16px; background: var(--background-light);
            border: 1px solid var(--border); border-radius: 20px;
            font-size: 0.9rem; color: var(--text); cursor: pointer;
        }
        .coze-prompt-chip:hover { border-color: var(--primary); color: var(--primary); }
        .coze-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .coze-loading { display: none; align-items: center; gap: 10px; padding: 10px 16px; flex-shrink: 0; }
        .coze-loading.active { display: flex; }
        .coze-stop-wrap { padding: 8px 16px; text-align: center; flex-shrink: 0; }
        .coze-stop-btn {
            padding: 8px 20px; font-size: 0.9rem; color: var(--text-light);
            background: var(--background-light); border: 1px solid var(--border);
            border-radius: 20px; cursor: pointer;
        }
        .coze-stop-btn:hover { color: var(--error); border-color: var(--error); }
        .coze-input-area {
            display: flex; gap: 10px; padding: 12px 16px;
            border-top: 1px solid var(--border); background: var(--background);
        }
        .coze-input {
            flex: 1; padding: 12px 16px; border: 1px solid var(--border);
            border-radius: 24px; font-size: 0.95rem; resize: none; min-height: 44px;
        }
        .coze-input:focus { outline: none; border-color: var(--primary); }
        .coze-send-btn {
            padding: 12px 24px; border-radius: 24px; border: none;
            background: var(--primary); color: white; font-weight: 500; cursor: pointer;
        }
        .coze-disclaimer {
            font-size: 0.75rem; color: var(--text-secondary);
            text-align: center; padding: 8px 16px; margin: 0;
        }
        .chat-intro {
            padding: 12px 20px;
            font-size: 0.9rem;
            color: var(--text-light);
            background: var(--background-light);
            border-bottom: 1px solid var(--border-light);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .chat-message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .chat-message.user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
        }
        .chat-message.assistant {
            align-self: flex-start;
            background: var(--background-light);
            border: 1px solid var(--border);
            color: var(--text-dark);
        }
        .chat-message.assistant .markdown-body { font-size: 0.95rem; }
        .chat-message.assistant .markdown-body p { margin: 0 0 0.5em 0; }
        .chat-message.assistant .markdown-body p:last-child { margin-bottom: 0; }
        .chat-loading {
            display: none;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            border-top: 1px solid var(--border-light);
            background: var(--background-light);
        }
        .chat-loading.active { display: flex; }
        .chat-input-wrap {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            background: var(--background);
        }
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            resize: none;
            min-height: 44px;
            max-height: 120px;
        }
        .chat-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .chat-send {
            align-self: flex-end;
            min-width: 80px;
        }
        @media (max-width: 768px) {
            .chat-view { height: calc(100vh - 60px - 24px); }
            .chat-message { max-width: 92%; }
        }

        @media (max-width: 768px) {
            .agents-grid {
                grid-template-columns: 1fr;
            }

            .tabs-nav {
                gap: 8px;
            }

            .tab-button {
                padding: 10px 16px;
                font-size: 0.85rem;
            }

            .welcome-section h1 {
                font-size: 2rem;
            }

            .welcome-subtitle {
                font-size: 1rem;
            }

            .agent-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="top-nav">
        <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
        <div class="nav-logo">超级IP：全链路AI智能内容工厂</div>
        <div class="nav-search">
            <input type="text" 
                   class="search-input" 
                   id="searchInput" 
                   placeholder="搜索智能体 (Ctrl+K)"
                   autocomplete="off">
            <span class="search-icon">🔍</span>
            <div class="search-results" id="searchResults"></div>
        </div>
        <div class="nav-actions">
            <button class="nav-button" onclick="showHistoryPanel()">📝 历史记录</button>
            <button class="nav-button" onclick="clearAllHistory()">🗑️ 清空历史</button>
        </div>
    </nav>

    <!-- 主布局 -->
    <div class="main-layout">
        <!-- 侧边栏遮罩 -->
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">智能体列表</div>
            <div id="sidebarContent"></div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 首页指引内容 -->
            <div class="homepage-guide" id="homepageGuide">
                <div class="welcome-section">
                    <h1>欢迎使用超级IP：全链路AI智能内容工厂</h1>
                    <p class="welcome-subtitle">选择下方分类，开始您的智能内容创作之旅</p>
                </div>
                
                <!-- 页签导航 -->
                <div class="tabs-container">
                    <div class="tabs-nav" id="tabsNav">
                        <!-- 页签将通过 JavaScript 动态生成 -->
                    </div>
                    
                    <!-- 页签内容区 -->
                    <div class="tabs-content" id="tabsContent">
                        <!-- 智能体卡片将通过 JavaScript 动态生成 -->
                    </div>
                </div>
            </div>

            <!-- 对话式智能体界面（Coze 风格） -->
            <div class="chat-view coze-style" id="agentInfoCard" style="display: none;">
                <div class="coze-chat-header">
                    <button type="button" class="coze-back" onclick="goToHomepage()" aria-label="返回">‹</button>
                    <div class="coze-chat-title-wrap">
                        <h2 id="selectedAgentName">请选择一个智能体</h2>
                        <p class="coze-chat-subtitle" id="cozeChatSubtitle">用户与当前智能体的对话 · 支持流式更新气泡 · 同会话使用 conversation_id 保留上下文</p>
                    </div>
                    <div class="coze-header-actions">
                        <button type="button" class="coze-icon-btn" onclick="copyResult()" title="复制上条回复">📋</button>
                        <button type="button" class="coze-icon-btn" onclick="clearCurrentHistory()" title="清空对话">🗑️</button>
                    </div>
                </div>
                <div class="coze-empty-state" id="cozeEmptyState">
                    <div class="coze-agent-avatar" id="cozeAgentAvatar">
                        <span class="coze-avatar-icon">🤖</span>
                    </div>
                    <h3 class="coze-agent-title" id="cozeAgentTitle">智能体</h3>
                    <div class="coze-welcome-bubble" id="cozeWelcomeBubble"></div>
                    <div class="coze-suggested-prompts" id="cozeSuggestedPrompts"></div>
                </div>
                <div class="coze-messages" id="chatMessages"></div>
                <div class="coze-loading" id="chatLoading">
                    <div class="loading-spinner"></div>
                    <p>AI正在回复...</p>
                </div>
                <div class="coze-stop-wrap" id="cozeStopWrap" style="display: none;">
                    <button type="button" class="coze-stop-btn" id="cozeStopBtn" onclick="stopStreaming()">停止响应</button>
                </div>
                <div class="coze-input-area">
                    <textarea id="userInput" class="coze-input" placeholder="发送消息..." rows="1"></textarea>
                    <button type="button" class="coze-send-btn" onclick="sendChatMessage()" id="submitBtn">发送</button>
                </div>
                <p class="coze-disclaimer">内容由AI生成，无法确保真实准确，仅供参考。</p>
            </div>
        </main>
    </div>

    <!-- 提示消息 -->
    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
</body>
</html>
